name: Unity WebGL Build

on:
  push:
    branches:
      - main

jobs:
  buildWebGL:
    name: Build for WebGL 🖥️
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-WebGL-${{ hashFiles('Assets/**','Packages/**','ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-WebGL-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4.4.0
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: 6000.2.13f1
          targetPlatform: WebGL

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: WebGLBuild
          path: build/WebGL/WebGL 

  deploy:
    name: Deploy to Github Pages 🚀
    needs: buildWebGL
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WebGLBuild
          path: build

      - name: Override index.html
        run: |
          cat > build/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en-us">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
              <title>Unity Web Player | Portafolio git pages</title>
              <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                html, body { width: 100%; height: 100%; overflow: hidden; background: #231F20; }
                #unity-canvas { display: block; width: 100vw !important; height: 100vh !important; }
              </style>
            </head>
            <body>
              <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
              <script src="Build/WebGL.loader.js"></script>
              <script>
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                  var meta = document.createElement('meta');
                  meta.name = 'viewport';
                  meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
                  document.getElementsByTagName('head')[0].appendChild(meta);
                }
                createUnityInstance(document.querySelector("#unity-canvas"), {
                  arguments: [],
                  dataUrl: "Build/WebGL.data",
                  frameworkUrl: "Build/WebGL.framework.js",
                  codeUrl: "Build/WebGL.wasm",
                  streamingAssetsUrl: "StreamingAssets",
                  companyName: "DefaultCompany",
                  productName: "Portafolio git pages",
                  productVersion: "0.0.30",
                }).then((unityInstance) => {
                }).catch((message) => {
                  alert(message);
                });
              </script>
            </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}  
          external_repository: AndresFForeroP/AndresFForeroP.github.io 
          publish_branch: main  
          publish_dir: build
          force_orphan: true